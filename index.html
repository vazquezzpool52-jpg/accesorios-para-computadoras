        body {

            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cart-icon-container {
            cursor: pointer;
            background: var(--accent-color);
            color: #000;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .cart-icon-container:hover {
            background: var(--accent-hover);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .section-title {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-top: 40px;
            font-size: 28px;
            text-transform: uppercase;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #222b3d;
            transition: transform 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #000;
        }

        .product-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 18px;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .product-desc {
            font-size: 14px;
            color: #a0aec0;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .product-price {
            font-size: 18px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .btn-add {
            background-color: var(--accent-color);
            color: #111;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: var(--accent-hover);
        }

        /* BOTÓN FLOTANTE DE TELEGRAM */
        .telegram-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--telegram-color);
            color: white;
            text-decoration: none;
            padding: 15px 22px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            transition: transform 0.3s, background-color 0.3s;
        }

        .telegram-btn:hover {
            transform: scale(1.08);
            background-color: #0077b3;
        }

        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 80%;
            overflow-y: auto;
            border: 1px solid var(--accent-color);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222b3d;
            padding-bottom: 10px;
        }

        .close-cart {
            cursor: pointer;
            font-size: 24px;
            color: #fff;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #222b3d;
        }

        .btn-remove {
            background: #ff4d4d;
            border: none;
            color: white;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;

        .cart-total {

            background-color: var(--accent-color);

            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>

        let carrito = JSON.parse(localStorage.getItem('carrito_gamer')) || [];

        function renderProductos() {
            const grids = {
                teclados: document.getElementById('teclados-grid'),
                ratones: document.getElementById('ratones-grid'),
                monitores: document.getElementById('monitores-grid')
            };

            Object.values(grids).forEach(g => g.innerHTML = '');

            productos.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img class="product-img" src="${prod.imagen}" alt="${prod.nombre}" loading="lazy">
                    <div class="product-info">
                        <h3 class="product-title">${prod.nombre}</h3>
                        <p class="product-desc">${prod.desc}</p>
                        <div class="product-footer">
                            <span class="product-price">$${prod.precio.toFixed(2)}</span>
                            <button class="btn-add" onclick="agregarAlCarrito(${prod.id})">Agregar</button>
                        </div>
                    </div>
                `;
                grids[prod.categoria].appendChild(card);
            });
        }

        function agregarAlCarrito(id) {
            const productoSeleccionado = productos.find(p => p.id === id);
            const existe = carrito.find(item => item.id === id);
            
            if (existe) {
                existe.cantidad += 1;
            } else {
                carrito.push({ ...productoSeleccionado, cantidad: 1 });
            }
            actualizarCarrito();
        }

        function eliminarDelCarrito(id) {
            carrito = carrito.filter(item => item.id !== id);
            actualizarCarrito();
        }

        function actualizarCarrito() {
            localStorage.setItem('carrito_gamer', JSON.stringify(carrito));
            
            const totalItems = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            document.getElementById('cart-count').innerText = totalItems;

            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            let precioTotal = 0;

            if (carrito.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#a0aec0;">El carrito está vacío.</p>';
            } else {
                carrito.forEach(item => {
                    precioTotal += item.precio * item.cantidad;
                    const itemRow = document.createElement('div');
                    itemRow.className = 'cart-item';
                    itemRow.innerHTML = `
                        <div>
                            <strong>${item.nombre}</strong> (x${item.cantidad})<br>
                            <span style="color: var(--accent-color); font-size:14px;">$${(item.precio * item.cantidad).toFixed(2)}</span>
                        </div>
                        <button class="btn-remove" onclick="eliminarDelCarrito(${item.id})">Quitar</button>
                    `;
                    container.appendChild(itemRow);
                });
            }
            document.getElementById('cart-total-price').innerText = precioTotal.toFixed(2);
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        // FUNCIÓN PRINCIPAL CON NOTIFICACIÓN DE COMPRA POR TELEGRAM
        function procesarCompra() {
            if (carrito.length === 0) {

                return;
            }

            // REEMPLAZA ESTOS VALORES CON TUS CREDENCIALES REALES
            const TELEGRAM_TOKEN = 'TU_TOKEN_DE_BOT_AQUÍ'; 
            const CHAT_ID = 'TU_CHAT_ID_AQUÍ';

            let mensaje = "🖥️ *¡NUEVA ORDEN GAMER RECIBIDA!* 🖥️\n\n";
            let total = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                mensaje += `• ${item.nombre} (x${item.cantidad}) - $${subtotal.toFixed(2)}\n`;
            });

            mensaje += `\n💰 *Total de la Venta:* $${total.toFixed(2)}`;

            fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: mensaje,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => {
                if (response.ok) {
                    alert("¡Pedido completado! Se ha enviado la lista de hardware al administrador.");
                    carrito = [];
                    actualizarCarrito();
                    toggleCart();
                } else {
                    alert("Error al enviar la orden por Telegram. Revisa el Token y Chat ID.");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Error de conexión al procesar el pago.");
            });
        }

# Inicializamos Flask y la aplicación de Telegram
app_flask = Flask(__name__)
telegram_app = Application.builder().token(TOKEN_TELEGRAM).build()

# --- PARTE 1: ACCIÓN QUE ENVÍA LA COMPRA ---
@app_flask.route('/webhook-compra', methods=['POST'])
def recibir_compra():
    """Esta ruta recibe los datos desde el JavaScript de tu web"""
    datos = request.json
    if not datos or 'productos' not in datos:
        return jsonify({"status": "error", "message": "Datos inválidos"}), 400

    productos = datos['productos']
    total = datos['total']

    # Construimos el formato del mensaje
    mensaje = "🖥️ *¡NUEVA COMPRA EN LA WEB!* 🖥️\n\n"
    for item in productos:
        mensaje += f"• {item['nombre']} (x{item['cantidad']}) - ${item['precio']}\n"
    mensaje += f"\n💰 *Total Facturado:* ${total}"

    # Enviamos el mensaje a tu chat usando el bot de forma asíncrona
    loop = asyncio.new_event_loop()
    asyncio.set_event_loop(loop)
    loop.run_until_complete(telegram_app.bot.send_message(
        chat_id=MI_CHAT_ID, 
        text=mensaje, 
        parse_mode='Markdown'
    ))
    loop.close()

    return jsonify({"status": "success", "message": "Notificación enviada a Telegram"}), 200


# --- PARTE 2: COMANDOS DEL BOT EN TELEGRAM ---
async def start(update: Update, context: ContextTypes.DEFAULT_TYPE) -> None:
    await update.message.reply_text("🤖 ¡Hola! Estoy activo y esperando compras de la web gamer.")

telegram_app.add_handler(CommandHandler("start", start))


# --- PARTE 3: ARRANQUE SIMULTÁNEO ---

    print("🤖 Bot de Telegram escuchando...")
    telegram_app.run_polling(allowed_updates=Update.ALL_TYPES, close_loop=False)
